name: Deploy

on:
  push:
    branches:
      - develop # Auto-deploy to DEV
      - staging # Auto-deploy to QA
      - main # Deploy to PROD (with approval)
  workflow_dispatch: # Manual trigger
    inputs:
      environment:
        description: 'Environment to deploy to'
        required: true
        type: choice
        options:
          - dev
          - qa
          - prod

jobs:
  # Build and push Docker images (required for all deployments)
  build-images:
    name: Build Docker Images
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    outputs:
      image-tag: ${{ steps.meta.outputs.version }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Determine image tag
        id: meta
        run: |
          if [ "${{ github.ref_name }}" == "main" ]; then
            echo "version=prod-${{ github.sha }}" >> $GITHUB_OUTPUT
          elif [ "${{ github.ref_name }}" == "staging" ]; then
            echo "version=qa-${{ github.sha }}" >> $GITHUB_OUTPUT
          else
            echo "version=dev-${{ github.sha }}" >> $GITHUB_OUTPUT
          fi

      - name: Build and push backend image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/stock-portfolio-backend:${{ steps.meta.outputs.version }}
            ghcr.io/${{ github.repository_owner }}/stock-portfolio-backend:${{ github.ref_name }}-latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push frontend image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./portfolio-dashboard/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/stock-portfolio-frontend:${{ steps.meta.outputs.version }}
            ghcr.io/${{ github.repository_owner }}/stock-portfolio-frontend:${{ github.ref_name }}-latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # Deploy to DEV environment
  deploy-dev:
    name: Deploy to DEV
    runs-on: ubuntu-latest
    needs: build-images
    if: github.ref == 'refs/heads/develop' || (github.event_name == 'workflow_dispatch' && inputs.environment == 'dev')
    environment:
      name: dev
      url: https://dev.your-domain.com

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to DEV
        run: |
          echo "🚀 Deploying to DEV environment..."
          echo "Image tag: ${{ needs.build-images.outputs.image-tag }}"
          # Add your deployment commands here
          # Examples:
          # - SSH to server and run docker compose pull && docker compose up -d
          # - kubectl set image deployment/...
          # - terraform apply
          # - AWS ECS update-service

      - name: Run smoke tests
        run: |
          echo "🧪 Running smoke tests..."
          # Add smoke test commands
          # curl -f https://dev.your-domain.com/api/health || exit 1

      - name: Notify deployment
        if: always()
        run: |
          echo "✅ DEV deployment completed"
          # Add Slack/Discord/Teams notification here

  # Deploy to QA environment
  deploy-qa:
    name: Deploy to QA
    runs-on: ubuntu-latest
    needs: build-images
    if: github.ref == 'refs/heads/staging' || (github.event_name == 'workflow_dispatch' && inputs.environment == 'qa')
    environment:
      name: qa
      url: https://qa.your-domain.com

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to QA
        run: |
          echo "🚀 Deploying to QA environment..."
          echo "Image tag: ${{ needs.build-images.outputs.image-tag }}"
          # Add your QA deployment commands here

      - name: Run smoke tests
        run: |
          echo "🧪 Running smoke tests..."
          # Add smoke test commands

      - name: Notify QA team
        if: always()
        run: |
          echo "✅ QA deployment completed - Ready for testing"
          # Add notification here

  # Deploy to PROD environment (requires approval)
  deploy-prod:
    name: Deploy to PROD
    runs-on: ubuntu-latest
    needs: build-images
    if: github.ref == 'refs/heads/main' || (github.event_name == 'workflow_dispatch' && inputs.environment == 'prod')
    environment:
      name: prod
      url: https://your-domain.com

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to PROD
        run: |
          echo "🚀 Deploying to PRODUCTION environment..."
          echo "Image tag: ${{ needs.build-images.outputs.image-tag }}"
          # Add your production deployment commands here

          # Example: Deploy using docker compose
          # scp docker-compose.yml user@prod-server:/app/
          # ssh user@prod-server "cd /app && docker compose pull && docker compose up -d"

      - name: Run smoke tests
        run: |
          echo "🧪 Running production smoke tests..."
          # Add smoke test commands
          # curl -f https://your-domain.com/api/health || exit 1

      - name: Create deployment tag
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git tag -a "release-$(date +'%Y%m%d-%H%M%S')" -m "Production deployment"
          git push origin --tags
        continue-on-error: true

      - name: Notify stakeholders
        if: always()
        run: |
          echo "✅ PRODUCTION deployment completed"
          # Add notification to stakeholders

  # Rollback job (manual trigger only)
  rollback:
    name: Rollback Deployment
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch'
    environment:
      name: ${{ inputs.environment }}

    steps:
      - name: Rollback to previous version
        run: |
          echo "⏮️ Rolling back ${{ inputs.environment }} to previous version..."
          # Add rollback commands here
          # docker compose down && docker compose up -d --use-previous-image
