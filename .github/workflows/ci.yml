name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  frontend-checks:
    name: Frontend - Lint, Type Check & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint:frontend

      - name: Check formatting (Prettier)
        run: npm run format:check --workspace=portfolio-dashboard

      - name: Type check
        run: npm run type-check:frontend

      - name: Run tests
        run: npm run test:frontend -- --watch=false --browsers=ChromeHeadless

      - name: Build application
        run: npm run build --workspace=portfolio-dashboard

  backend-checks:
    name: Backend - Lint, Type Check & Test
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ./backend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Check formatting (Black)
        run: black --check .

      - name: Lint with Ruff
        run: ruff check .

      - name: Type check with mypy
        run: mypy .

      - name: Security check with Bandit
        run: bandit -r . -c pyproject.toml
        continue-on-error: true

      # Uncomment when tests are added
      # - name: Run tests
      #   run: pytest --cov=. --cov-report=xml

      # - name: Upload coverage
      #   uses: codecov/codecov-action@v3
      #   with:
      #     file: ./backend/coverage.xml

  commitlint:
    name: Validate Commit Messages
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install commitlint
        run: |
          npm install -g @commitlint/cli @commitlint/config-conventional

      - name: Validate commit messages
        run: |
          npx commitlint --from ${{ github.event.pull_request.base.sha }} --to ${{ github.event.pull_request.head.sha }} --verbose
